<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>血脂与用药安全追踪</title>
    <link rel="stylesheet" href="./assets/styles.css?v=20260628c" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">个人长期治疗记录</p>
        <h1>血脂与用药安全追踪</h1>
      </div>
      <div class="header-actions">
        <button class="secondary" id="exportBtn" type="button">导出</button>
        <label class="secondary file-label" for="importFile">导入</label>
        <input id="importFile" type="file" accept="application/json" />
        <button class="primary" id="addLabBtn" type="button">新增指标</button>
      </div>
    </header>

    <main>
      <section class="overview-grid" aria-label="当前概览">
        <article class="summary-panel wide">
          <div class="panel-title">
            <span>当前状态</span>
            <strong id="latestDate">暂无记录</strong>
          </div>
          <div class="status-strip" id="statusStrip"></div>
        </article>
      </section>

      <nav class="tabs" aria-label="模块切换">
        <button class="tab active" data-view="dashboard" type="button">总览</button>
        <button class="tab" data-view="trends" type="button">趋势</button>
        <button class="tab" data-view="timeline" type="button">时间线</button>
        <button class="tab" data-view="meds" type="button">用药</button>
        <button class="tab" data-view="reports" type="button">报告与录入</button>
      </nav>

      <section class="view active" id="dashboard">
        <div class="section-heading">
          <h2>关键指标</h2>
          <p>按最近一次检查结果显示，异常项会自动标记。</p>
        </div>
        <div class="metric-grid" id="metricGrid"></div>
      </section>

      <section class="view" id="trends">
        <div class="section-heading">
          <h2>趋势变化</h2>
          <p>切换不同指标组，观察用药调整前后的变化。</p>
        </div>
        <div class="segmented" id="chartGroups"></div>
        <div class="chart-wrap">
          <svg id="trendChart" role="img" aria-label="指标趋势图"></svg>
        </div>
        <div class="legend" id="chartLegend"></div>
      </section>

      <section class="view" id="timeline">
        <div class="section-heading">
          <h2>治疗时间线</h2>
          <p>把检查结果、加药、停药和医生建议放在同一条线里。</p>
        </div>
        <div class="timeline" id="timelineList"></div>
      </section>

      <section class="view" id="meds">
        <div class="section-heading">
          <h2>用药管理</h2>
          <p>记录药物开始、调整、停用和用途。</p>
        </div>
        <div class="med-layout">
          <form class="entry-form" id="medForm">
            <label>药品名称<input name="name" required /></label>
            <label>用途<input name="purpose" placeholder="调脂 / 护肝 / 甲状腺" /></label>
            <label>剂量频次<input name="dose" placeholder="按医嘱填写" /></label>
            <label>开始日期<input name="startDate" type="date" /></label>
            <label>结束日期<input name="endDate" type="date" /></label>
            <label>备注<textarea name="notes" rows="3"></textarea></label>
            <button class="primary" type="submit">保存用药</button>
          </form>
          <div class="table-wrap">
            <table>
              <thead><tr><th>药品</th><th>用途</th><th>剂量</th><th>时间</th></tr></thead>
              <tbody id="medTable"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section class="view" id="reports">
        <div class="section-heading">
          <h2>报告与录入</h2>
          <p>每次复查后录入指标，或导入之前导出的 JSON 文件。</p>
        </div>
        <form class="entry-form lab-form" id="labForm">
          <label>检查日期<input name="date" type="date" required /></label>
          <label>指标代码<select name="code" required id="metricSelect"></select></label>
          <label>数值<input name="value" type="number" step="0.001" required /></label>
          <label>单位<input name="unit" placeholder="mmol/L" /></label>
          <label>参考下限<input name="min" type="number" step="0.001" /></label>
          <label>参考上限<input name="max" type="number" step="0.001" /></label>
          <label>报告名称<input name="report" placeholder="例如 2026-06-26 血脂四项" /></label>
          <label>备注<textarea name="notes" rows="3"></textarea></label>
          <button class="primary" type="submit">保存指标</button>
        </form>
        <div class="table-wrap">
          <table>
            <thead><tr><th>日期</th><th>指标</th><th>结果</th><th>参考范围</th><th>报告</th></tr></thead>
            <tbody id="labTable"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./assets/app.js"></script>
  </body>
</html>
