<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>血脂与用药安全追踪</title>
    <link rel="stylesheet" href="./assets/styles.css?v=20260628f" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">个人长期治疗记录</p>
        <h1>血脂与用药安全追踪</h1>
      </div>
      <div class="header-actions">
        <button class="secondary" id="printBtn" type="button">打印</button>
        <button class="secondary" id="exportBtn" type="button">导出备份</button>
      </div>
    </header>

    <main>
      <section class="unlock-panel" id="unlockPanel" aria-label="数据解锁">
        <div>
          <h2>输入查看密码</h2>
          <p>网页会从 GitHub 自动读取加密数据，并只在当前浏览器里解开。</p>
        </div>
        <form class="unlock-form" id="unlockForm">
          <input id="dataPassword" type="password" autocomplete="current-password" placeholder="查看密码" />
          <button class="primary" type="submit">查看记录</button>
        </form>
        <p class="form-message" id="unlockMessage"></p>
      </section>

      <div class="content-shell is-locked" id="contentShell">
        <section class="summary-panel" aria-label="医生摘要">
          <div class="panel-title">
            <span>医生摘要</span>
            <strong id="latestDate">等待解锁</strong>
          </div>
          <div class="doctor-summary">
            <article class="summary-primary">
              <span>医生先看</span>
              <ul id="doctorHighlights"></ul>
              <p class="stored-summary" id="attentionSummary">-</p>
            </article>
            <div class="summary-side">
              <article>
                <span>基础情况</span>
                <p id="profileSummary">-</p>
              </article>
              <article>
                <span>当前用药</span>
                <p id="currentMeds">-</p>
              </article>
            </div>
          </div>
          <div class="status-strip" id="statusStrip"></div>
        </section>

        <nav class="tabs" aria-label="模块切换">
          <button class="tab active" data-view="trends" type="button">趋势</button>
          <button class="tab" data-view="labs" type="button">指标</button>
          <button class="tab" data-view="timeline" type="button">时间线</button>
          <button class="tab" data-view="meds" type="button">用药</button>
        </nav>

        <section class="view active" id="trends">
          <div class="section-heading">
            <h2>趋势变化</h2>
            <p>用于观察调脂和护肝方案调整前后的变化。</p>
          </div>
          <div class="segmented" id="chartGroups"></div>
          <div class="chart-wrap">
            <svg id="trendChart" role="img" aria-label="指标趋势图"></svg>
          </div>
          <div class="legend" id="chartLegend"></div>
        </section>

        <section class="view" id="labs">
          <div class="section-heading">
            <h2>全部指标</h2>
            <p>按检查日期倒序展示，异常项自动标记。</p>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>日期</th>
                  <th>指标</th>
                  <th>结果</th>
                  <th>参考范围</th>
                  <th>报告</th>
                </tr>
              </thead>
              <tbody id="labTable"></tbody>
            </table>
          </div>
        </section>

        <section class="view" id="timeline">
          <div class="section-heading">
            <h2>治疗时间线</h2>
            <p>检查结果、加药和方案调整放在同一条线里。</p>
          </div>
          <div class="timeline" id="timelineList"></div>
        </section>

        <section class="view" id="meds">
          <div class="section-heading">
            <h2>用药记录</h2>
            <p>用药变化由后续报告或截图更新。</p>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>药品</th>
                  <th>用途</th>
                  <th>剂量</th>
                  <th>时间</th>
                  <th>备注</th>
                </tr>
              </thead>
              <tbody id="medTable"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>

    <script src="./assets/app.js?v=20260628e"></script>
    <script src="./assets/enhance.js?v=20260628a"></script>
  </body>
</html>
